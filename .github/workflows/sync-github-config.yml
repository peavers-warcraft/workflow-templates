name: Sync GitHub Config

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without pushing'
        type: boolean
        default: false
      target_repo:
        description: 'Sync to specific repo only (leave empty for all)'
        type: string
        default: ''
  # Auto-trigger disabled: the canonical Sync workflow lives in
  # peavers-warcraft/workflow-templates (correct org for warcraft-runners +
  # Vault App token). This duplicate fired on every push and created a second,
  # redundant PR per repo. Left as workflow_dispatch-only pending full removal.

permissions:
  contents: write
  pull-requests: write
  id-token: write          # mint the GitHub App token via Vault OIDC (self-hosted)

jobs:
  sync:
    runs-on: warcraft-runners   # in-cluster: reaches Vault AND has org-wide App token
    strategy:
      fail-fast: false
      matrix:
        repo:
          - PeaversAlwaysSquare
          - PeaversBestInSlot
          - PeaversBestInSlotData
          - PeaversCVars
          - PeaversCommons
          - PeaversCurrencyData
          - PeaversDynamicStats
          - PeaversItemLevel
          - PeaversLustNow
          - PeaversLustNowData
          - PeaversNeedThat
          - PeaversRealValue
          - PeaversRemembersYou
          - PeaversSafeList
          - PeaversSpellExporter
          - PeaversSystemBars
          - PeaversTalents
          - PeaversTalentsData
          - PeaversUI
    steps:
      - name: Check if should run for this repo
        id: should-run
        run: |
          TARGET="${{ inputs.target_repo }}"
          CURRENT="${{ matrix.repo }}"

          if [[ -z "$TARGET" ]] || [[ "$TARGET" == "$CURRENT" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping $CURRENT (target is $TARGET)"
          fi

      # PERSONAL_ACCESS_TOKEN PAT is retired; mint a short-lived org-scoped App token.
      - name: Mint GitHub App token
        if: steps.should-run.outputs.should_run == 'true'
        id: ghtoken
        uses: peavers/.github/actions/gh-app-token@main

      - name: Checkout workflow-templates
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target repo
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: peavers-warcraft/${{ matrix.repo }}
          path: target
          token: ${{ steps.ghtoken.outputs.token }}

      - name: Sync templates
        if: steps.should-run.outputs.should_run == 'true'
        id: sync
        run: |
          cd target

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create unique branch name
          BRANCH_NAME="sync/issue-templates-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          # Ensure .github directory exists
          mkdir -p .github/ISSUE_TEMPLATE
          mkdir -p .github/workflows

          # Copy issue templates
          cp -r ../source/.github/ISSUE_TEMPLATE/* .github/ISSUE_TEMPLATE/

          # Copy FUNDING.yml
          cp ../source/.github/FUNDING.yml .github/FUNDING.yml

          # Copy caller workflow from source if target doesn't have one
          if [ ! -f .github/workflows/validate-issues.yml ]; then
            cp ../source/.github/workflows/validate-issues-caller.yml .github/workflows/validate-issues.yml
          fi

          # Stage changes first (so we can detect new files)
          git add .github/

          # Check for changes (staged)
          if git diff --staged --quiet; then
            echo "No changes to sync"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Commit
          git commit -m "chore: Sync issue templates from workflow-templates"

          # Push (unless dry run)
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "DRY RUN: Would push branch $BRANCH_NAME"
            echo "Changes:"
            git diff HEAD~1 --stat
          else
            git push origin "$BRANCH_NAME"
          fi

      - name: Create Pull Request
        if: steps.should-run.outputs.should_run == 'true' && steps.sync.outputs.has_changes == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ steps.ghtoken.outputs.token }}
        run: |
          cd target

          # Write PR body to file using echo
          {
            echo "## Summary"
            echo "This PR syncs GitHub configuration from the [workflow-templates](https://github.com/peavers-warcraft/workflow-templates) repository."
            echo ""
            echo "## Changes"
            echo "- Updated \`.github/ISSUE_TEMPLATE/\` directory"
            echo "- Updated \`.github/FUNDING.yml\`"
            echo "- Added/updated validation workflow"
            echo ""
            echo "## What's included"
            echo "- **Bug Report template**: Guides users to provide WoW version, addon version, error text, and reproduction steps"
            echo "- **Feature Request template**: Structured feature proposals"
            echo "- **Issue validation workflow**: Auto-closes issues that don't follow the template"
            echo "- **FUNDING.yml**: Patreon sponsorship link"
            echo ""
            echo "---"
            echo "*This PR was automatically created by the sync workflow.*"
          } > /tmp/pr_body.md

          gh pr create \
            --title "Sync GitHub config from workflow-templates" \
            --body-file /tmp/pr_body.md \
            --base master || echo "PR may already exist or failed to create"

      - name: Summary
        if: steps.should-run.outputs.should_run == 'true'
        run: |
          if [[ "${{ steps.sync.outputs.has_changes }}" == "true" ]]; then
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "### ${{ matrix.repo }}: Would create PR (dry run)" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ${{ matrix.repo }}: PR created" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ${{ matrix.repo }}: No changes needed" >> $GITHUB_STEP_SUMMARY
          fi
