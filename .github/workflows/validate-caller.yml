# Per-addon validation workflow. Copy to each addon repo as .github/workflows/validate.yml
# (mirrors how release.yml calls the shared workflow-templates).
#   - On pull_request: posts luacheck + LuaLS findings as inline reviewdog comments.
#   - On push to master / manual run: upserts one tracking issue with master's findings.
name: Validate

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

# A called reusable workflow is capped by the caller's permissions (the repo default token
# is read-only), so grant what the two reporting paths need: PR-write for reviewdog comments,
# issues-write for the master tracking issue.
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    uses: peavers-warcraft/workflow-templates/.github/workflows/validate.yml@master
    secrets: inherit
